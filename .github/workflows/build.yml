name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64]
        configuration: [Release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v',''
          (Get-Content FeatureTool.csproj -Raw) -replace '<Version>.*?</Version>', "<Version>$ver</Version>" |
            Set-Content FeatureTool.csproj -NoNewline
          Write-Host "Version set to $ver"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore FeatureTool.csproj -p:Platform=${{ matrix.platform }}

      - name: Build
        run: dotnet build FeatureTool.csproj -c ${{ matrix.configuration }} -p:Platform=${{ matrix.platform }} --no-restore

      - name: Publish
        run: dotnet publish FeatureTool.csproj -c ${{ matrix.configuration }} -p:Platform=${{ matrix.platform }} -p:RuntimeIdentifier=win-${{ matrix.platform }} -p:PublishReadyToRun=false --self-contained false -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FeatureTool-${{ matrix.platform }}
          path: publish\

      - name: Zip for release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath FeatureTool-${{ matrix.platform }}.zip

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: FeatureTool-${{ matrix.platform }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
